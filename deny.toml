# cargo-deny configuration — supply-chain checks for dependencies.
# Run locally with: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Check the full API surface, including grpc/qdrant/pinecone backends.
all-features = true

[advisories]
# RustSec advisory database (same source cargo-audit uses).
yanked = "deny"

[licenses]
# Every dependency license must be on this allowlist.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

# ring bundles code under an ISC-style license plus OpenSSL heritage; this is
# the standard clarification used across the ecosystem.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Duplicate major versions are common in async trees (e.g. tonic pulls axum
# 0.7 while we use 0.8); surface them without failing the build.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
