name: Security audit

# cargo-audit against the RustSec advisory database. Runs on a weekly
# schedule (new advisories land without code changes), whenever the
# dependency tree changes, and on demand.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write # rustsec/audit-check files an issue per advisory found

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
