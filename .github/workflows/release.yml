name: Release

# Publishes to crates.io ONLY when a GitHub Release is published:
#
#   gh release create v0.1.0 --generate-notes
#   (or draft + publish a release in the GitHub UI)
#
# Pushing commits or opening PRs never publishes — those runs are covered by
# ci.yml, whose `cargo publish --dry-run` is a packaging check, not an upload.
#
# Requires the repository secret CARGO_REGISTRY_TOKEN (a crates.io API token
# with publish scope): Settings → Secrets and variables → Actions.

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check release tag matches Cargo.toml version
        run: |
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          tag_version="${TAG_NAME#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "::error::release tag ${TAG_NAME} does not match Cargo.toml version ${crate_version}"
            exit 1
          fi
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Run the full test suite
        run: |
          cargo fmt --check
          cargo clippy --all-targets --features full -- -D warnings
          cargo test --features full

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
