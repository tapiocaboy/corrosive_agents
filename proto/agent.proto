// gRPC surface of a corrosive agent.
//
// Generated Rust code is vendored at src/grpc/pb.rs so that library users do
// not need protoc. After editing this file, regenerate with:
//
//   cargo run --manifest-path tools/protogen/Cargo.toml
//
// (see PUBLISHING.md § Regenerating gRPC code)

syntax = "proto3";

package corrosive.agent.v1;

// Remote interface to a running agent.
service AgentService {
  // Fetch the agent's public info (name, version, capabilities, public key).
  rpc GetInfo(GetInfoRequest) returns (AgentInfo);
  // One chat turn; conversation history is kept per session_id.
  rpc Chat(ChatRequest) returns (ChatReply);
  // Streaming chat turn: incremental deltas, terminated by done=true.
  rpc ChatStream(ChatRequest) returns (stream ChatChunk);
  // Execute a registered skill with a JSON-encoded input.
  rpc ExecuteSkill(SkillRequest) returns (SkillReply);
}

message GetInfoRequest {}

message CapabilityInfo {
  string name = 1;
  string description = 2;
  bool enabled = 3;
}

message AgentInfo {
  string name = 1;
  string version = 2;
  string description = 3;
  repeated CapabilityInfo capabilities = 4;
  repeated string skills = 5;
  // Base64 Ed25519 public key; empty when the agent has no identity.
  string public_key = 6;
  bool signed = 7;
}

message ChatRequest {
  // Session to continue; server generates one when empty.
  string session_id = 1;
  string message = 2;
}

message ChatReply {
  string session_id = 1;
  string reply = 2;
}

message ChatChunk {
  string session_id = 1;
  string delta = 2;
  bool done = 3;
}

message SkillRequest {
  string name = 1;
  // JSON-encoded input object.
  string input_json = 2;
}

message SkillReply {
  // JSON-encoded output.
  string output_json = 1;
}
